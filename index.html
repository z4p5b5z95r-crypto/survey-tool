<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>旅行時間調查</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0f172a;font-family:-apple-system,'PingFang TC',sans-serif}
.screen{display:none;height:100dvh;flex-direction:column}
.screen.active{display:flex}

/* ── Sign-in ── */
#screen-signin{background:#f1f5f9}
.signin-hero{background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%);padding:20px 20px 16px;color:white;flex-shrink:0;text-align:center}
.signin-hero .route-badge{display:inline-block;background:rgba(255,255,255,.1);border-radius:20px;padding:5px 14px;font-size:12px;color:#94a3b8;margin-bottom:8px}
.signin-hero h2{font-size:18px;font-weight:800;margin-bottom:3px}
.signin-hero p{font-size:12px;color:#94a3b8}
.signin-info{display:flex;justify-content:center;gap:12px;margin-top:10px;flex-wrap:wrap}
.signin-chip{font-size:12px;color:#60a5fa;background:rgba(96,165,250,.12);padding:4px 10px;border-radius:10px}
.signin-body{flex:1;overflow-y:auto;padding:14px 16px}
.signin-card{background:white;border-radius:14px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:12px}
.signin-card h3{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.field label{display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:5px}
.field input{width:100%;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:11px;font-size:16px;outline:none;background:white}
.field input:focus{border-color:#3b82f6}
.w-row{display:flex;gap:8px;margin-top:4px}
.w-btn{flex:1;padding:10px 6px;border:2px solid #e2e8f0;border-radius:11px;background:white;cursor:pointer;text-align:center;font-size:22px;transition:all .15s}
.w-btn span{display:block;font-size:11px;color:#64748b;margin-top:3px;font-weight:600}
.w-btn.sel{border-color:#3b82f6;background:#eff6ff}
.w-btn.sel span{color:#1d4ed8}
/* Signin route map */
#map-signin{height:185px;border-radius:12px;overflow:hidden;margin-bottom:8px;z-index:0}
.route-legend{display:flex;gap:14px;font-size:11px;color:#64748b;flex-wrap:wrap}
.route-legend span{display:flex;align-items:center;gap:5px}
.seg-preview{display:flex;flex-direction:column;gap:5px}
.seg-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f1f5f9;font-size:13px}
.seg-row:last-child{border:none}
.seg-dot{width:8px;height:8px;border-radius:50%;background:#3b82f6;flex-shrink:0}
.btn-signin{width:100%;padding:16px;background:#16a34a;color:white;border:none;border-radius:16px;font-size:18px;font-weight:800;cursor:pointer;box-shadow:0 4px 16px rgba(22,163,74,.3);margin-top:4px}
.btn-signin:disabled{background:#94a3b8;box-shadow:none}

/* ── Setup (manual) ── */
#screen-setup{background:#f1f5f9}
.page-header{background:#1e293b;padding:15px 16px;color:white;flex-shrink:0}
.page-header h2{font-size:18px;font-weight:800}
.page-header p{font-size:12px;color:#94a3b8;margin-top:2px}
.scroll-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
.card{background:white;border-radius:14px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.card-title{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.field{margin-bottom:10px}
.field:last-child{margin-bottom:0}
.row2{display:flex;gap:8px}
.row2 .field{flex:1}
.field input,.field select{width:100%;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:15px;outline:none;background:white}
.field input:focus{border-color:#3b82f6}
.seg-list{display:flex;flex-direction:column;gap:7px;margin-bottom:10px}
.seg-item{background:#f8fafc;border-radius:10px;padding:10px 12px;border:1px solid #e2e8f0;display:flex;align-items:center;gap:8px}
.seg-info{flex:1}
.seg-name{font-size:13px;font-weight:600;color:#1e293b}
.seg-meta{font-size:11px;color:#94a3b8;margin-top:1px}
.seg-del{background:#fee2e2;color:#dc2626;border:none;border-radius:7px;padding:4px 9px;font-size:12px;cursor:pointer}
.btn-add{width:100%;padding:11px;border:2px dashed #cbd5e1;border-radius:10px;background:transparent;color:#64748b;font-size:14px;cursor:pointer;margin-bottom:10px}
.seg-form{background:#eff6ff;border-radius:12px;padding:12px;border:2px solid #3b82f6;margin-bottom:10px;display:none}
.seg-form.open{display:block}
.seg-form-row{display:flex;gap:8px;margin-bottom:8px}
.seg-form-row input{flex:1;padding:9px 10px;border:1.5px solid #bfdbfe;border-radius:8px;font-size:14px;outline:none;background:white}
.seg-form-btns{display:flex;gap:8px}
.btn-seg-ok{flex:1;padding:10px;background:#2563eb;color:white;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer}
.btn-seg-cancel{padding:10px 14px;background:#e2e8f0;border:none;border-radius:8px;font-size:14px;cursor:pointer}
.btn-primary{width:100%;padding:17px;background:#16a34a;color:white;border:none;border-radius:16px;font-size:17px;font-weight:800;cursor:pointer;flex-shrink:0}

/* ── Ready ── */
#screen-ready{background:#0f172a}
#map-ready{height:38%;flex-shrink:0}
.ready-panel{flex:1;background:#1e293b;padding:12px 16px 20px;display:flex;flex-direction:column;gap:10px;border-top:1px solid #334155;overflow-y:auto}
.ready-title{color:white;font-size:16px;font-weight:800;text-align:center}
.ready-route-info{text-align:center;color:#94a3b8;font-size:12px}
.gps-status{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.07);padding:8px 14px;border-radius:20px;color:#94a3b8;font-size:13px;justify-content:center}
.gps-dot{width:9px;height:9px;border-radius:50%;background:#94a3b8;flex-shrink:0}
.gps-dot.good{background:#4ade80;animation:blink 1.5s infinite}
.gps-dot.poor{background:#fbbf24}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.combo-label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#475569;margin-bottom:5px}
.combo-row{display:flex;gap:8px;margin-bottom:8px}
.combo-btn{flex:1;padding:11px 6px;background:#0f172a;border:2px solid #334155;border-radius:12px;color:#94a3b8;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.combo-btn.pk{background:#450a0a;border-color:#ef4444;color:#fca5a5}
.combo-btn.dr{background:#0c2a4e;border-color:#3b82f6;color:#93c5fd}
.sel-badge{text-align:center;font-size:13px;font-weight:700;color:#a78bfa;background:rgba(167,139,250,.12);padding:6px 12px;border-radius:10px;display:none}
.progress-chips{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.chip{font-size:11px;padding:3px 9px;border-radius:20px;background:#0f172a;color:#475569;font-weight:600}
.chip.done{background:#14532d;color:#4ade80}
.btn-start{width:100%;padding:16px;background:#16a34a;color:white;border:none;border-radius:16px;font-size:17px;font-weight:800;cursor:pointer;box-shadow:0 4px 16px rgba(22,163,74,.3);margin-top:auto;flex-shrink:0}
.btn-start:disabled{background:#374151;box-shadow:none;cursor:default}

/* ══ Survey ══ */
#screen-survey{position:relative}
.map-wrap{height:24%;position:relative;flex-shrink:0}
#map-survey{width:100%;height:100%}
.gps-badge{position:absolute;bottom:6px;right:8px;background:rgba(0,0,0,.65);color:#4ade80;padding:3px 8px;border-radius:10px;font-size:11px;z-index:999}
.status-bar{background:#0f172a;padding:6px 14px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.status-left{color:#4ade80;font-size:12px;font-weight:700}
.status-right{color:#94a3b8;font-size:13px;font-family:monospace}

/* Node progress */
.node-progress{display:flex;align-items:center;padding:6px 12px 4px;overflow-x:auto;flex-shrink:0;background:#1e293b}
.nd{width:20px;height:20px;border-radius:50%;background:#334155;border:2px solid #475569;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#94a3b8;flex-shrink:0;transition:all .2s}
.nd.done{background:#14532d;border-color:#4ade80;color:#4ade80}
.nd.cur{background:#1d4ed8;border-color:#60a5fa;color:white;animation:pu 1.5s infinite}
@keyframes pu{0%,100%{box-shadow:0 0 0 0 rgba(96,165,250,.5)}50%{box-shadow:0 0 0 5px rgba(96,165,250,0)}}
.nd-line{height:2px;background:#334155;flex:1;min-width:8px}
.nd-line.done{background:#4ade80}

/* Next-node card */
.next-node-card{margin:8px 12px 0;border-radius:16px;padding:14px 16px;background:linear-gradient(135deg,#1d4ed8,#2563eb);color:white;flex-shrink:0;position:relative;overflow:hidden}
.next-node-card.arriving{background:linear-gradient(135deg,#15803d,#16a34a);animation:cardPulse 1s infinite}
.next-node-card.done{background:#374151;animation:none}
@keyframes cardPulse{0%,100%{opacity:1}50%{opacity:.85}}
.nnc-label{font-size:10px;color:rgba(255,255,255,.75);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.nnc-name{font-size:20px;font-weight:800;line-height:1.2;margin-bottom:5px}
.nnc-dist{font-size:13px;color:rgba(255,255,255,.85);display:flex;align-items:center;gap:8px}
.nnc-dist .dist-num{font-size:18px;font-weight:800;color:white}
.nnc-manual{position:absolute;right:10px;top:50%;transform:translateY(-50%);padding:5px 7px;background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.4);border-radius:8px;color:white;font-size:10px;font-weight:700;cursor:pointer;backdrop-filter:blur(4px);line-height:1.3;text-align:center}
.nnc-manual:active{background:rgba(255,255,255,.35)}

/* Scrollable delay area — side-by-side columns */
.delay-columns{flex:1;overflow-y:auto;background:#1e293b;display:flex;gap:8px;padding:8px 10px 6px}
.delay-col{flex:1;display:flex;flex-direction:column;gap:7px;min-width:0}
.dl-col-label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#475569;font-weight:700;text-align:center;padding:3px 0 4px;border-bottom:1px solid #334155;margin-bottom:2px}
.btn-dl{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 6px;min-height:68px;background:#0f172a;border:2px solid #334155;border-radius:12px;color:#94a3b8;cursor:pointer;transition:all .15s;width:100%}
.btn-dl:active{transform:scale(.96)}
.btn-dl.active{background:#450a0a;border-color:#ef4444;color:#fca5a5}
.btn-dl .di{font-size:22px}
.btn-dl .dn{font-size:11px;margin-top:4px;text-align:center;line-height:1.2;font-weight:600}
.btn-dl .dt{font-size:10px;font-family:monospace;color:#f87171;margin-top:2px}
.survey-bottom-row{display:flex;gap:8px;margin:6px 12px;flex-shrink:0}
.btn-end{flex:1;padding:16px;background:#dc2626;color:white;border:none;border-radius:14px;font-size:16px;font-weight:800;cursor:pointer}
.btn-pause{width:64px;padding:16px 0;background:#d97706;color:white;border:none;border-radius:14px;font-size:20px;cursor:pointer;flex-shrink:0;transition:background .15s}
.btn-pause.paused{background:#16a34a}

/* ── Trip Done ── */
#screen-tripdone{background:#f1f5f9}
.td-header{background:#16a34a;padding:18px 16px;color:white;text-align:center;flex-shrink:0}
.td-header h2{font-size:20px;font-weight:800}
.td-header p{font-size:13px;color:rgba(255,255,255,.8);margin-top:3px}
.stat-row{display:flex;gap:8px}
.stat-card{flex:1;background:white;border-radius:12px;padding:11px 8px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.stat-card .si{font-size:18px}
.stat-card .sl{font-size:10px;color:#94a3b8;margin:2px 0;display:block}
.stat-card .sv{font-size:13px;font-weight:800;color:#1e293b}
.prog-card{background:white;border-radius:14px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.prog-card h3{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.prog-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f1f5f9;font-size:13px}
.prog-row:last-child{border:none}
.badge-done{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:#dcfce7;color:#16a34a}
.badge-todo{font-size:11px;padding:3px 9px;border-radius:20px;background:#f1f5f9;color:#94a3b8}
.btn-blue{width:100%;padding:16px;background:#2563eb;color:white;border:none;border-radius:14px;font-size:15px;font-weight:800;cursor:pointer}
.btn-purple{width:100%;padding:16px;background:#7c3aed;color:white;border:none;border-radius:14px;font-size:15px;font-weight:800;cursor:pointer}

/* ── Report ── */
#screen-report{background:#f1f5f9}
.report-wrap{overflow-x:auto;background:white;border-radius:14px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.rt{width:100%;border-collapse:collapse;font-size:11px;min-width:380px}
.rt th{background:#1e293b;color:white;padding:6px 7px;text-align:center;font-size:10px;font-weight:600;white-space:nowrap}
.rt td{padding:5px 7px;border:1px solid #e2e8f0;text-align:center;white-space:nowrap}
.rtl{text-align:left!important;background:#f8fafc;font-weight:600;color:#374151}
.rts{background:#334155;color:white;font-weight:700}
.rth{background:#e2e8f0;color:#1e293b;font-weight:700}
.export-row{display:flex;gap:8px}
.btn-ex{flex:1;padding:14px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer}
.btn-ex.html{background:#7c3aed;color:white}
.btn-ex.csv{background:#2563eb;color:white}
.sec-title{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;margin-bottom:6px}
#map-result{height:240px;border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.1)}

/* ── SGS Official Form ── */
.sgs-form{background:white;border-radius:10px;overflow-x:auto;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.1);border:2px solid #1e293b}
.sgs-t{width:100%;border-collapse:collapse;font-size:10px;min-width:680px}
.sgs-t td,.sgs-t th{border:1px solid #475569;padding:2px 3px;vertical-align:middle;text-align:center;white-space:nowrap}
.sgs-logo{font-size:18px;font-weight:900;color:#dc2626;font-style:italic;padding:4px 6px!important;border:2px solid #dc2626!important;letter-spacing:-1px}
.sgs-title{font-size:13px;font-weight:800;color:#0f172a;letter-spacing:1px}
.sgs-meta-l{text-align:left!important;color:#374151;font-weight:600}
.sgs-meta-v{text-align:left!important}
.sgs-th{background:#e2e8f0;font-weight:700;font-size:10px;color:#1e293b}
.sgs-seg{text-align:left!important;font-weight:600;font-size:10px}
.sgs-t-time{color:#2563eb;font-weight:700}
.sgs-total{background:#dbeafe;font-weight:700}
.sgs-footer-l{background:#f1f5f9;font-weight:700;text-align:left!important}
.sgs-footer-v{background:#f1f5f9}
/* ── Toast ── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1e293b;color:white;padding:9px 18px;border-radius:20px;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.toast.node-toast{background:#15803d;font-size:16px;font-weight:700;padding:12px 22px;border-radius:24px;box-shadow:0 4px 18px rgba(0,0,0,.35)}
</style>
</head>
<body>

<!-- ══ Screen -1: Sign-in ══ -->
<div id="screen-signin" class="screen">
  <div class="signin-hero">
    <div class="route-badge">旅行時間調查</div>
    <h2 id="si-route-name">載入任務中...</h2>
    <p id="si-fromto"></p>
    <div class="signin-info">
      <span class="signin-chip" id="si-offpeak"></span>
      <span class="signin-chip" id="si-peak"></span>
      <span class="signin-chip" id="si-segs"></span>
    </div>
  </div>
  <div class="signin-body">

    <!-- Route map preview -->
    <div class="signin-card">
      <h3>📍 路線地圖</h3>
      <div id="map-signin"></div>
      <div id="route-dir-text" style="font-size:12px;color:#64748b;margin-top:6px;text-align:center;line-height:1.8"></div>
    </div>

    <!-- Surveyor info -->
    <div class="signin-card">
      <h3>調查員資訊</h3>
      <div class="field" style="margin-bottom:12px">
        <label>調查員姓名</label>
        <input id="si-name" placeholder="請輸入姓名或代號" autocomplete="off"/>
      </div>
      <div class="field">
        <label>當日天氣</label>
        <div class="w-row">
          <button class="w-btn" id="sw-sunny"  onclick="selSigninWeather('sunny')">☀️<span>晴</span></button>
          <button class="w-btn" id="sw-cloudy" onclick="selSigninWeather('cloudy')">☁️<span>陰</span></button>
          <button class="w-btn" id="sw-rainy"  onclick="selSigninWeather('rainy')">🌧️<span>雨</span></button>
        </div>
      </div>
    </div>

    <!-- Segment preview -->
    <div class="signin-card">
      <h3>路段清單</h3>
      <div class="seg-preview" id="si-seg-preview"></div>
    </div>

    <button class="btn-signin" id="btn-signin" disabled onclick="startFromQR()">
      ✓ 確認開始調查
    </button>
  </div>
</div>

<!-- ══ Screen 0: Manual Setup ══ -->
<div id="screen-setup" class="screen">
  <div class="page-header"><h2>⚙️ 調查設定</h2><p>手動填寫路線資訊與路段設定</p></div>
  <div class="scroll-body">
    <div class="card">
      <div class="card-title">路線資訊</div>
      <div class="field"><label>路線名稱</label><input id="s-route-name" placeholder="台二省道轉新市二路到港子平"/></div>
      <div class="field"><label>起迄點位置</label><input id="s-route-fromto" placeholder="港子平-新市二路-台二線"/></div>
      <div class="row2">
        <div class="field"><label>全長（公尺）</label><input id="s-length" type="number" placeholder="3050"/></div>
        <div class="field"><label>日期</label><input id="s-date" type="date"/></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">調查人員與天氣</div>
      <div class="field"><label>調查員姓名</label><input id="s-surveyor" placeholder="姓名"/></div>
      <div class="field">
        <label>天氣</label>
        <div class="w-row">
          <button class="w-btn" id="w-sunny"  onclick="selWeather('sunny')">☀️<span>晴</span></button>
          <button class="w-btn" id="w-cloudy" onclick="selWeather('cloudy')">☁️<span>陰</span></button>
          <button class="w-btn" id="w-rainy"  onclick="selWeather('rainy')">🌧️<span>雨</span></button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">調查時間區間</div>
      <div class="row2">
        <div class="field"><label>離峰時間</label><input id="s-offpeak" placeholder="14:00~16:00"/></div>
        <div class="field"><label>尖峰時間</label><input id="s-peak" placeholder="17:00~19:00"/></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">路段設定（依行進順序）</div>
      <div id="seg-list" class="seg-list"></div>
      <button class="btn-add" onclick="openSegForm()">＋ 新增路段</button>
      <div class="seg-form" id="seg-form">
        <div style="font-size:12px;font-weight:700;color:#2563eb;margin-bottom:8px">新增路段</div>
        <div class="seg-form-row"><input id="sf-name" placeholder="路段名稱" style="flex:2"/></div>
        <div class="seg-form-row">
          <input id="sf-lanes" type="number" placeholder="車道數"/>
          <input id="sf-width" type="number" placeholder="路寬(m)"/>
          <input id="sf-length" type="number" placeholder="長度(m)"/>
        </div>
        <div class="seg-form-btns">
          <button class="btn-seg-ok" onclick="addSeg()">確認新增</button>
          <button class="btn-seg-cancel" onclick="closeSegForm()">取消</button>
        </div>
      </div>
    </div>

<script>
// ════════════════════════════════════

]
const INT_DELAYS = [

const WEATHER_ZH  = {sunny:'晴', cloudy:'陰', rainy:'雨'}

// ════════════════════════════════════
//  STATE
// ════════════════════════════════════

  routeName:'', routeFromTo:'', totalLength:0,
  surveyor:'', weather:'', date:'',
  offPeakLabel:'14:00~16:00', peakLabel:'17:00~19:00',
  segments:[], nodes:[]
}
let routePolylines = []   // OSRM latlngs per segment (pre-fetched)
let qrMode = false
let signinWeather = ''
let allTrips = {}
let cur = null

// GPS
let watchId=null, mapReady=null, mapSurvey=null, mapResult=null, mapSignin=null

let markerReady=null, markerSurvey=null

// ════════════════════════════════════
//  UTILS
// ════════════════════════════════════
function fmtSec(s){const m=Math.floor(s/60),r=s%60;return`${String(m).padStart(2,'0')}:${String(r).padStart(2,'0')}`}
function fmtTime(s){if(!s&&s!==0)return'--';const m=Math.floor(s/60),r=s%60;return`${m}分${String(r).padStart(2,'0')}秒`}
function fmtHMS(d){return d?d.toTimeString().slice(0,8):''}
function showToast(m,isNode=false){const t=document.getElementById('toast');t.textContent=m;t.className='toast'+(isNode?' node-toast':'');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),isNode?3000:2500)}
function $(id){return document.getElementById(id)}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'))
  $(id).classList.add('active')
  setTimeout(()=>{
    if(id==='screen-survey'&&mapSurvey) mapSurvey.invalidateSize()
    if(id==='screen-report'&&mapResult)  mapResult.invalidateSize()
  },80)
}
function haversine(lat1,lng1,lat2,lng2){
  const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)))
}

// ════════════════════════════════════
//  OSRM ROUTE PRE-FETCH
// ════════════════════════════════════
async function prefetchRoutes(){
  if(!config.nodes||config.nodes.length<2){routePolylines=[];return}
  routePolylines=[]
  for(let i=0;i<config.nodes.length-1;i++){
    const n1=config.nodes[i],n2=config.nodes[i+1]
    try{
      const url=`https://router.project-osrm.org/route/v1/driving/${n1.lng},${n1.lat};${n2.lng},${n2.lat}?overview=full&geometries=geojson`
      const res=await fetch(url,{signal:AbortSignal.timeout(8000)})
      const data=await res.json()
      if(data.code==='Ok'){routePolylines.push(data.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]));continue}
    }catch{}
    routePolylines.push([[n1.lat,n1.lng],[n2.lat,n2.lng]])
  }
}

// ════════════════════════════════════
//  QR DECODE
// ════════════════════════════════════
function decodeConfig(encoded){
  try{
    const b64=encoded.replace(/-/g,'+').replace(/_/g,'/')
    const padded=b64+'=='.slice(0,(4-b64.length%4)%4)
    return JSON.parse(decodeURIComponent(escape(atob(padded))))
  }catch{return null}
}
function loadFromHash(){
  const params=new URLSearchParams(location.search)
  let encoded=params.get('c')
  if(!encoded){const m=location.hash.match(/#c=(.+)/);encoded=m?m[1]:null}
  if(!encoded) return false
  const cfg=decodeConfig(encoded)
  if(!cfg||cfg.v!==1) return false
  config.routeName   =cfg.rn||''
  config.routeFromTo =cfg.ft||''
  config.totalLength =cfg.tl||0
  config.offPeakLabel=cfg.op||'14:00~16:00'
  config.peakLabel   =cfg.pk||'17:00~19:00'
  config.date        =new Date().toLocaleDateString('zh-TW')
  config.nodes=(cfg.nd||[]).map(n=>({name:n.n||n.r1||'節點',lat:n.a,lng:n.o,radius:n.r||15}))
  config.segments=(cfg.sg||[]).map(s=>({name:s.n,lanes:s.l,width:s.w,length:s.d}))
  return true
}

// ════════════════════════════════════
//  SIGNIN MAP
// ════════════════════════════════════
function initSigninMap(){
  if(!config.nodes||config.nodes.length<2) return
  if(mapSignin){mapSignin.remove();mapSignin=null}
  mapSignin=L.map('map-signin',{zoomControl:true,attributionControl:false,dragging:true,scrollWheelZoom:true,touchZoom:true})
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(mapSignin)

  // Single route line
  const lls=routePolylines.length>0?routePolylines.flat():config.nodes.map(n=>[n.lat,n.lng])
  const poly=L.polyline(lls,{color:'#3b82f6',weight:5,opacity:.85}).addTo(mapSignin)

  // Numbered node markers (no name labels)
  config.nodes.forEach((n,i)=>{
    L.marker([n.lat,n.lng],{icon:L.divIcon({
      html:`<div style="width:22px;height:22px;background:#1d4ed8;border:2.5px solid white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:white;box-shadow:0 2px 6px rgba(0,0,0,.3)">${i+1}</div>`,
      className:'',iconSize:[22,22],iconAnchor:[11,11]
    })}).addTo(mapSignin)
  })
  mapSignin.fitBounds(poly.getBounds(),{padding:[18,18]})

  // Direction text below map
  const nums=config.nodes.map((_,i)=>i+1)
  const dirEl=$('route-dir-text')
  if(dirEl){
    dirEl.innerHTML=`去程：${nums.join(' → ')}<br>回程：${[...nums].reverse().join(' → ')}`
  }
}

// ════════════════════════════════════
//  MANUAL SETUP
// ════════════════════════════════════
function selWeather(w){setupWeather=w;['sunny','cloudy','rainy'].forEach(x=>$('w-'+x).classList.toggle('sel',x===w))}
function openSegForm(){$('seg-form').classList.add('open');$('sf-name').focus()}

// ════════════════════════════════════
//  MAPS INIT + ROUTE DRAW
// ════════════════════════════════════
function drawRouteOnMap(targetMap, layerKey){
  if(!config.nodes||config.nodes.length<2) return
  if(window[layerKey]) targetMap.removeLayer(window[layerKey])
  // Use OSRM route if available, else straight lines between nodes
  const allLls=routePolylines.length>0
    ?routePolylines.flat()
    :config.nodes.map(n=>[n.lat,n.lng])
  window[layerKey]=L.polyline(allLls,{color:'#3b82f6',weight:4,opacity:.8}).addTo(targetMap)
  config.nodes.forEach((n,i)=>{
    const color=i===0?'#16a34a':i===config.nodes.length-1?'#dc2626':'#6366f1'
    L.circleMarker([n.lat,n.lng],{radius:7,fillColor:color,color:'#fff',weight:2,fillOpacity:1})
      .bindTooltip(`${i+1}. ${n.name}`,{direction:'top',offset:[0,-8]}).addTo(targetMap)
  })
  targetMap.fitBounds(window[layerKey].getBounds(),{padding:[30,30]})
}

function initMaps(){
  startGPS()
  if(mapReady) return
  mapReady=L.map('map-ready',{zoomControl:true,attributionControl:false})
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(mapReady)
  const initPos=config.nodes.length?[config.nodes[0].lat,config.nodes[0].lng]:[25.04776,121.51755]
  mapReady.setView(initPos,14)
  markerReady=L.circleMarker(initPos,{radius:10,fillColor:'#3B82F6',color:'#fff',weight:3,fillOpacity:.95}).addTo(mapReady)
  drawRouteOnMap(mapReady,'routeLayerReady')
}

// ════════════════════════════════════
//  GPS
// ════════════════════════════════════
function smooth(lat,lng,alpha=0.3){
  if(!lastPos)return{lat,lng}
  return{lat:lastPos.lat*(1-alpha)+lat*alpha,lng:lastPos.lng*(1-alpha)+lng*alpha}
}
function togglePause(){
  isPaused=!isPaused
  const btn=$('btn-pause')
  if(isPaused){
    pauseStart=new Date()
    // stop any active delay timers
    Object.keys(activeDelays).forEach(cause=>{
      const d=activeDelays[cause]
      if(d&&d.startedAt) d._pausedAt=new Date()
    })
    btn.textContent='▶'
    btn.classList.add('paused')
    btn.title='繼續調查'
    showToast('⏸ 調查已暫停')
  } else {
    if(pauseStart) totalPausedMs+=(new Date()-pauseStart)
    pauseStart=null
    // resume delay timers
    Object.keys(activeDelays).forEach(cause=>{
      const d=activeDelays[cause]
      if(d&&d._pausedAt){
        // shift startedAt forward by paused duration
        d.startedAt=new Date(d.startedAt.getTime()+(new Date()-d._pausedAt))
        delete d._pausedAt
      }
    })
    btn.textContent='⏸'
    btn.classList.remove('paused')
    btn.title='暫停調查'
    showToast('▶ 調查繼續中')
  }
}

// ════════════════════════════════════
//  SCREEN WAKE LOCK
// ════════════════════════════════════
let wakeLockSentinel = null

async function acquireWakeLock() {
  if (!('wakeLock' in navigator)) return  // not supported
  try {
    wakeLockSentinel = await navigator.wakeLock.request('screen')
    // Re-acquire after visibility change (e.g. tab switch back)
    document.addEventListener('visibilitychange', reacquireWakeLock)
  } catch(e) {
    // permission denied or not available — silently ignore
  }
}

async function reacquireWakeLock() {
  if (document.visibilityState === 'visible' && cur && cur.startTime && !cur.endTime) {
    try { wakeLockSentinel = await navigator.wakeLock.request('screen') } catch(e) {}
  }
}

function releaseWakeLock() {
  document.removeEventListener('visibilitychange', reacquireWakeLock)
  if (wakeLockSentinel) { wakeLockSentinel.release(); wakeLockSentinel = null }
}

function startGPS(){
  if(watchId||!navigator.geolocation)return
  watchId=navigator.geolocation.watchPosition(onPos,onGPSErr,{enableHighAccuracy:true,timeout:10000,maximumAge:1500})
}
function onPos(p){
  const{latitude:rl,longitude:ro,accuracy,speed}=p.coords
  const{lat,lng}=smooth(rl,ro);lastPos={lat,lng}
  const dot=$('gps-dot'),txt=$('gps-text')
  if(accuracy<30){dot.className='gps-dot good';txt.textContent=`GPS良好 ±${Math.round(accuracy)}m`}
  else{dot.className='gps-dot poor';txt.textContent=`GPS ±${Math.round(accuracy)}m`}
  const b=$('gps-badge');if(b)b.textContent=`📡 ±${Math.round(accuracy)}m`
  checkStart()
  if(mapReady&&markerReady){markerReady.setLatLng([lat,lng]);mapReady.panTo([lat,lng],{animate:true,duration:.3})}
  if(cur&&!cur.endTime){
    if(mapSurvey&&markerSurvey){markerSurvey.setLatLng([lat,lng]);mapSurvey.setView([lat,lng],mapSurvey.getZoom()||16,{animate:true,duration:.5})}
    if(!isPaused){
      cur.gpsTrack.push({lat,lng,speed_ms:speed,accuracy_m:accuracy,ts:new Date().toISOString()})
      checkNodeProximity(lat,lng)
    }
  }
}

function getOrderedNodes(){

  return cur&&cur.direction==='return'?[...ns].reverse():ns

function checkNodeProximity(lat,lng){
  const names=getNodeNames()
  if(currentNodeIdx>=names.length) return
  const ordered=getOrderedNodes()
  const nextNode=ordered[currentNodeIdx]
  if(!nextNode) return
  const dist=haversine(lat,lng,nextNode.lat,nextNode.lng)
  const triggerR=nextNode.radius||AUTO_RECORD_DIST
  // Update distance display
  const card=$('next-node-card')
  $('nnc-dist-num').textContent=dist
  $('nnc-auto-hint').textContent=`• ${triggerR}m 內自動記錄`
  if(dist<=triggerR){
    card.classList.add('arriving')
    if(!nodeAutoLock){
      nodeAutoLock=true
      recordNode(true)
      setTimeout(()=>{nodeAutoLock=false},3000)
    }
  }else{
    card.classList.remove('arriving')
  }
}
function manualRecordNode(){
  if(currentNodeIdx>=getNodeNames().length) return
  recordNode(false)
}
function playNodeBeep(isFinal){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)()
    const play=(freq,startT,dur)=>{
      const o=ctx.createOscillator(),g=ctx.createGain()
      o.connect(g);g.connect(ctx.destination)
      o.type='sine';o.frequency.setValueAtTime(freq,startT)
      g.gain.setValueAtTime(0.55,startT)
      g.gain.exponentialRampToValueAtTime(0.001,startT+dur)
      o.start(startT);o.stop(startT+dur)
    }
    const t=ctx.currentTime
    if(isFinal){
      // 終點：三連音上升
      play(660,t,0.12);play(880,t+0.13,0.12);play(1100,t+0.26,0.2)
    } else {
      // 一般節點：雙音叮
      play(880,t,0.12);play(1100,t+0.15,0.18)
    }
    setTimeout(()=>ctx.close(),800)
  }catch(e){}
}

function recordNode(auto){
  const names=getNodeNames()
  if(currentNodeIdx>=names.length) return
  const now=new Date()
  nodeTimestamps.push(now)

  // ── First node: start the clock ──
  if(currentNodeIdx===0){
    cur.startTime=now
    if(clockTimer) clearInterval(clockTimer)
    clockTimer=setInterval(()=>{
      if(isPaused) return
      elapsedSec++
      $('status-timer').textContent=fmtSec(elapsedSec)
    },1000)
  }

  // Haptic + sound feedback
  if(navigator.vibrate) navigator.vibrate([150,50,150])

  // Update progress dots
  const dot=$(`nd-${currentNodeIdx}`)
  if(dot) dot.className='nd done'
  const line=$(`ndl-${currentNodeIdx}`)
  if(line) line.className='nd-line done'
  const justRecorded=currentNodeIdx+1
  currentNodeIdx++
  const isFinal=currentNodeIdx>=names.length
  playNodeBeep(isFinal)

  // ── Last node: stop the clock ──
  if(isFinal){
    cur.endTime=now
    clearInterval(clockTimer); clockTimer=null
    releaseWakeLock()
    updateNextNodeCard()
    showToast(`🏁 已抵達終點！節點 ${justRecorded}／${names.length}`,true)
  }else{
    const nextDot=$(`nd-${currentNodeIdx}`)
    if(nextDot) nextDot.className='nd cur'
    updateNextNodeCard()
    showToast(`✅ 節點 ${justRecorded}／${names.length} 已記錄`,true)
  }
}
function updateNextNodeCard(){
  const names=getNodeNames()
  const card=$('next-node-card')
  if(currentNodeIdx>=names.length){
    card.classList.add('done');card.classList.remove('arriving')
    $('nnc-label').textContent='調查完成'
    $('nnc-name').textContent='✅ 已到終點'
    $('nnc-dist-num').textContent=''
    $('nnc-dist-unit').textContent=''
    $('nnc-auto-hint').textContent=''
    $('nnc-manual-btn').style.display='none'
    return
  }
  card.classList.remove('done','arriving')
  $('nnc-label').textContent=currentNodeIdx===0?`⏳ 等待第一個節點計時開始`:`節點 ${currentNodeIdx+1} / ${names.length}`
  $('nnc-name').textContent=names[currentNodeIdx]
  $('nnc-dist-num').textContent=lastPos?haversine(lastPos.lat,lastPos.lng,...getOrderedNodes()[currentNodeIdx]?[getOrderedNodes()[currentNodeIdx].lat,getOrderedNodes()[currentNodeIdx].lng]:[0,0]):'-'
  $('nnc-dist-unit').textContent='m'
  $('nnc-auto-hint').textContent='• 15m 內自動記錄'
  $('nnc-manual-btn').style.display=''
}

function toggleDelay(d,group){
  if(activeDelay&&activeDelay.cause===d.cause){
    clearInterval(activeDelay.timerId)
    const end=new Date(),dur=Math.round((end-activeDelay.startedAt)/1000)
    if(group==='road')cur.roadDelays[d.cause]=(cur.roadDelays[d.cause]||0)+dur
    else cur.intDelays[d.cause]=(cur.intDelays[d.cause]||0)+dur
    delayLog.push({cause:d.cause,group,label:d.label,icon:d.icon,startedAt:activeDelay.startedAt,endedAt:end,durationS:dur,pos:activeDelay.startPos})
    $(`dbtn-${d.cause}`).classList.remove('active')
    $(`dtime-${d.cause}`).textContent='';activeDelay=null
  }else{
    if(activeDelay){const p=[...ROAD_DELAYS,...INT_DELAYS].find(x=>x.cause===activeDelay.cause);if(p)toggleDelay(p,activeDelay.group)}
    const s=new Date(),sp=lastPos?{...lastPos}:null;let el=0
    const tid=setInterval(()=>{el++;const e=$(`dtime-${d.cause}`);if(e)e.textContent=fmtSec(el)},1000)
    activeDelay={cause:d.cause,group,startedAt:s,timerId:tid,startPos:sp}
    $(`dbtn-${d.cause}`).classList.add('active')
  }
}

function endSurvey(){
  if(!confirm('確定結束調查？'))return
  // auto-resume if paused
  if(isPaused){ if(pauseStart) totalPausedMs+=(new Date()-pauseStart); pauseStart=null; isPaused=false }
  releaseWakeLock()
  // If last node already set endTime, keep it; otherwise record now
  if(!cur.endTime) cur.endTime=new Date()
  // If first node was never hit, treat start = end (0s trip)
  if(!cur.startTime) cur.startTime=cur.endTime
  if(activeDelay){const p=[...ROAD_DELAYS,...INT_DELAYS].find(x=>x.cause===activeDelay.cause);if(p)toggleDelay(p,activeDelay.group)}
  if(clockTimer){clearInterval(clockTimer);clockTimer=null}
  // Ensure nodeTimestamps has enough entries for segment calc
  if(nodeTimestamps.length<config.segments.length+1)nodeTimestamps.push(cur.endTime)
  const travelS=Math.max(0,Math.round((cur.endTime-cur.startTime)/1000)-Math.round(totalPausedMs/1000))
  const roadTotalS=Object.values(cur.roadDelays).reduce((a,b)=>a+b,0)
  const intTotalS=Object.values(cur.intDelays).reduce((a,b)=>a+b,0)
  const totalDelayS=roadTotalS+intTotalS
  const runS=Math.max(0,travelS-totalDelayS)
  const runRatio=travelS>0?runS/travelS:1
  const segTimes=config.segments.map((_,i)=>{
    const t0=nodeTimestamps[i],t1=nodeTimestamps[i+1]
    const segS=t0&&t1?Math.round((t1-t0)/1000):null
    return{travelS:segS,runS:segS?Math.round(segS*runRatio):null}
  })
  const segsForTable=cur.direction==='return'?[...segTimes].reverse():segTimes
  allTrips[cur.key]={
    peakType:cur.peakType,direction:cur.direction,
    travelS,runS,totalDelayS,roadTotalS,intTotalS,
    roadDelays:{...cur.roadDelays},intDelays:{...cur.intDelays},
    segTimes:segsForTable,delayLog:[...delayLog],
    gpsTrack:[...cur.gpsTrack],startTime:cur.startTime,endTime:cur.endTime,
    nodeTimestamps:[...nodeTimestamps],
  }
  buildTripDoneUI(travelS,totalDelayS,runS)
  showScreen('screen-tripdone')
}

function segDelaysForIdx(trip, i){
  const t0=trip.nodeTimestamps?.[i], t1=trip.nodeTimestamps?.[i+1]
  const r={}; ;[...ROAD_DELAYS,...INT_DELAYS].forEach(d=>r[d.cause]=0)
  if(trip.delayLog&&t0&&t1) trip.delayLog.forEach(dl=>{
    const ds=new Date(dl.startedAt)
    if(ds>=new Date(t0)&&ds<new Date(t1)&&r[dl.cause]!==undefined) r[dl.cause]+=dl.durationS
  })
  return r
}

function buildResultMap(){
  if(mapResult){mapResult.remove();mapResult=null}
  mapResult=L.map('map-result',{zoomControl:true,attributionControl:false})
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(mapResult)
  let hasLayer=false
  Object.values(allTrips).forEach((t,i)=>{
    if(!t.gpsTrack||t.gpsTrack.length<2)return
    const colors=['#3b82f6','#ef4444','#16a34a','#f59e0b']
    const ll=t.gpsTrack.map(p=>[p.lat,p.lng])
    const poly=L.polyline(ll,{color:colors[i%4],weight:3,opacity:.8}).addTo(mapResult)
    if(!hasLayer){mapResult.fitBounds(poly.getBounds(),{padding:[20,20]});hasLayer=true}
    t.delayLog.forEach(r=>{
      if(!r.pos)return
      L.marker([r.pos.lat,r.pos.lng],{icon:L.divIcon({html:`<div style="font-size:18px">${r.icon}</div>`,className:'',iconSize:[20,20],iconAnchor:[10,10]})})
        .bindPopup(`${r.icon} ${r.label}<br>${fmtHMS(r.startedAt)}<br>${r.durationS}秒`).addTo(mapResult)
    })
  })
  if(!hasLayer&&lastPos)mapResult.setView([lastPos.lat,lastPos.lng],14)
  if(config.nodes&&config.nodes.length>=2){
    const lls=routePolylines.length>0?routePolylines.flat():config.nodes.map(n=>[n.lat,n.lng])
    L.polyline(lls,{color:'#6366f1',weight:2,opacity:.5,dashArray:'6,4'}).addTo(mapResult)
  }
}
