<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>旅行時間調查</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #0f172a; font-family: -apple-system, 'PingFang TC', sans-serif; }

  /* ── 畫面切換 ── */
  .screen { display: none; height: 100dvh; flex-direction: column; }
  .screen.active { display: flex; }

  /* ══════════════════════════════════════
     畫面 A：準備（地圖 45% + 控制面板 55%）
  ══════════════════════════════════════ */
  #screen-ready { background: #0f172a; }
  #map-ready { height: 45%; flex-shrink: 0; }

  .ready-panel {
    flex: 1; background: #1e293b;
    padding: 14px 16px 24px;
    display: flex; flex-direction: column;
    gap: 10px; border-top: 1px solid #334155;
    overflow-y: auto;
  }
  .ready-title { color: white; font-size: 18px; font-weight: 800; text-align: center; }

  .gps-status {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.07);
    padding: 9px 16px; border-radius: 20px;
    color: #94a3b8; font-size: 13px; justify-content: center;
  }
  .gps-dot { width: 9px; height: 9px; border-radius: 50%; background: #94a3b8; flex-shrink: 0; }
  .gps-dot.good { background: #4ade80; animation: blink 1.5s infinite; }
  .gps-dot.poor { background: #fbbf24; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── 組合選擇 ── */
  .combo-section { width: 100%; }
  .combo-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: .5px;
    color: #475569; margin-bottom: 6px;
  }
  .combo-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .combo-btn {
    flex: 1; padding: 11px 6px;
    background: #0f172a; border: 2px solid #334155;
    border-radius: 12px; color: #94a3b8;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: all .15s; line-height: 1.3;
  }
  .combo-btn:active { transform: scale(.97); }
  .combo-btn.peak-sel   { background: #450a0a; border-color: #ef4444; color: #fca5a5; }
  .combo-btn.bound-sel  { background: #0c2a4e; border-color: #3b82f6; color: #93c5fd; }

  .selected-combo-badge {
    text-align: center; font-size: 13px; font-weight: 700;
    color: #a78bfa; background: rgba(167,139,250,.12);
    padding: 7px 12px; border-radius: 10px;
    display: none;
  }

  .btn-start {
    width: 100%; padding: 18px;
    background: #16a34a; color: white;
    border: none; border-radius: 16px;
    font-size: 18px; font-weight: 800; cursor: pointer;
    box-shadow: 0 4px 20px rgba(22,163,74,.35);
    margin-top: auto; flex-shrink: 0;
  }
  .btn-start:disabled { background: #374151; box-shadow: none; cursor: default; }
  .btn-start:not(:disabled):active { transform: scale(.97); }

  /* ══════════════════════════════════════
     畫面 B：調查中
  ══════════════════════════════════════ */
  #screen-survey { position: relative; }
  .map-wrap { height: 40%; position: relative; flex-shrink: 0; }
  #map-survey { width: 100%; height: 100%; }
  .off-route {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    background: #ef4444; color: white;
    padding: 6px 16px; border-radius: 20px;
    font-size: 13px; font-weight: 700; z-index: 999;
    pointer-events: none; display: none;
  }
  .gps-badge {
    position: absolute; bottom: 8px; right: 8px;
    background: rgba(0,0,0,.6); color: #4ade80;
    padding: 3px 9px; border-radius: 10px; font-size: 11px; z-index: 999;
  }

  .status-bar {
    background: #1e293b; padding: 7px 14px;
    display: flex; justify-content: space-between; align-items: center;
    border-top: 1px solid #334155; flex-shrink: 0;
  }
  .status-left  { color: #4ade80; font-size: 12px; font-weight: 700; }
  .status-right { color: #94a3b8; font-size: 13px; font-family: monospace; }

  .action-area {
    flex: 1; background: #1e293b;
    padding: 10px 12px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 8px;
  }
  .delay-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: .5px;
    color: #475569; margin-bottom: 2px;
  }
  .delay-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 7px; }
  .btn-delay {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 9px 4px; min-height: 66px;
    background: #0f172a; border: 2px solid #334155;
    border-radius: 12px; color: #94a3b8; cursor: pointer; transition: all .15s;
  }
  .btn-delay.active { background: #450a0a; border-color: #ef4444; color: #fca5a5; }
  .btn-delay .di { font-size: 20px; }
  .btn-delay .dn { font-size: 11px; margin-top: 2px; }
  .btn-delay .dt { font-size: 11px; font-family: monospace; color: #f87171; margin-top: 1px; }

  .btn-end {
    width: 100%; padding: 16px;
    background: #dc2626; color: white;
    border: none; border-radius: 14px;
    font-size: 16px; font-weight: 800; cursor: pointer; flex-shrink: 0;
  }
  .btn-end:active { background: #b91c1c; }

  /* ══════════════════════════════════════
     畫面 C：結果報表
  ══════════════════════════════════════ */
  #screen-result { background: #f1f5f9; overflow-y: auto; }

  .result-header {
    background: #1e293b; padding: 18px 16px;
    color: white; flex-shrink: 0;
  }
  .result-header h2 { font-size: 18px; font-weight: 800; margin-bottom: 3px; }
  .result-header p  { font-size: 13px; color: #94a3b8; }
  .combo-tag {
    display: inline-block; margin-top: 6px;
    font-size: 12px; font-weight: 700; padding: 3px 10px;
    border-radius: 20px; background: rgba(167,139,250,.2); color: #a78bfa;
  }

  .result-body { padding: 14px; display: flex; flex-direction: column; gap: 12px; }

  .section-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: .5px;
    color: #94a3b8; margin-bottom: 6px;
  }
  .stat-row { display: flex; gap: 8px; }
  .stat-card {
    flex: 1; background: white; border-radius: 12px;
    padding: 12px 8px; text-align: center;
    box-shadow: 0 1px 3px rgba(0,0,0,.07);
  }
  .stat-card .si { font-size: 20px; }
  .stat-card .sl { font-size: 10px; color: #94a3b8; margin: 2px 0; display: block; }
  .stat-card .sv { font-size: 14px; font-weight: 800; color: #1e293b; }

  /* 結果地圖 */
  #map-result {
    height: 260px; border-radius: 14px; overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,.1);
  }

  /* 延滯明細表 */
  .delay-table {
    width: 100%; border-collapse: collapse;
    background: white; border-radius: 12px; overflow: hidden;
    box-shadow: 0 1px 3px rgba(0,0,0,.07); font-size: 13px;
  }
  .delay-table th {
    background: #f1f5f9; color: #475569;
    padding: 9px 11px; text-align: left; font-weight: 600;
  }
  .delay-table td { padding: 9px 11px; border-top: 1px solid #f1f5f9; }
  .delay-table tr:last-child td { border: none; }

  /* 匯出按鈕 */
  .export-btns { display: flex; gap: 8px; }
  .btn-export {
    flex: 1; padding: 14px; border: none; border-radius: 12px;
    font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .btn-export.csv    { background: #2563eb; color: white; }
  .btn-export.report { background: #7c3aed; color: white; }
  .btn-export.copy   { background: #e2e8f0; color: #1e293b; }
  .btn-restart {
    width: 100%; padding: 16px;
    background: #16a34a; color: white;
    border: none; border-radius: 14px;
    font-size: 16px; font-weight: 800; cursor: pointer;
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    background: #1e293b; color: white;
    padding: 9px 18px; border-radius: 20px; font-size: 14px;
    z-index: 9999; opacity: 0; transition: opacity .3s; pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  /* 延滯圖例 */
  .map-legend {
    background: white; border-radius: 10px; padding: 8px 12px;
    font-size: 12px; color: #475569;
    box-shadow: 0 1px 3px rgba(0,0,0,.07);
    display: flex; flex-wrap: wrap; gap: 6px 12px;
  }
  .legend-item { display: flex; align-items: center; gap: 4px; }
</style>
</head>
<body>

<!-- ══════════════════════════════════
     畫面 A：準備
══════════════════════════════════ -->
<div id="screen-ready" class="screen active">
  <div id="map-ready"></div>
  <div class="ready-panel">
    <div class="ready-title">🚗 旅行時間調查</div>

    <div class="gps-status">
      <div class="gps-dot" id="gps-dot-ready"></div>
      <span id="gps-text-ready">等待 GPS 訊號...</span>
    </div>

    <!-- 時段選擇 -->
    <div class="combo-section">
      <div class="combo-label">時段</div>
      <div class="combo-row">
        <button class="combo-btn" id="btn-peak"    onclick="selectPeak('peak')">🔴 尖峰</button>
        <button class="combo-btn" id="btn-offpeak" onclick="selectPeak('off_peak')">🟢 離峰</button>
      </div>
    </div>

    <!-- 方向選擇 -->
    <div class="combo-section">
      <div class="combo-label">方向</div>
      <div class="combo-row">
        <button class="combo-btn" id="btn-bound"  onclick="selectDir('bound')">→ 去程</button>
        <button class="combo-btn" id="btn-return" onclick="selectDir('return')">← 回程</button>
      </div>
    </div>

    <!-- 已選組合顯示 -->
    <div class="selected-combo-badge" id="combo-badge">—</div>

    <button class="btn-start" id="btn-start" disabled onclick="startSurvey()">
      ▶ 開始調查
    </button>
  </div>
</div>

<!-- ══════════════════════════════════
     畫面 B：調查進行中
══════════════════════════════════ -->
<div id="screen-survey" class="screen">
  <div class="map-wrap">
    <div id="map-survey"></div>
    <div class="off-route" id="off-route-alert">⚠️ 偏離路線</div>
    <div class="gps-badge" id="gps-badge">📡 定位中...</div>
  </div>

  <div class="status-bar">
    <span class="status-left" id="status-label">● 調查中</span>
    <span class="status-right" id="status-timer">00:00</span>
  </div>

  <div class="action-area">
    <div>
      <p class="delay-label">延滯（點一下開始計時，再點停止）</p>
      <div class="delay-grid" id="delay-grid"></div>
    </div>
    <button class="btn-end" onclick="endSurvey()">🔴 結束調查</button>
  </div>
</div>

<!-- ══════════════════════════════════
     畫面 C：結果報表
══════════════════════════════════ -->
<div id="screen-result" class="screen">
  <div class="result-header">
    <h2>✅ 調查完成</h2>
    <p id="result-datetime"></p>
    <span class="combo-tag" id="result-combo-tag"></span>
  </div>
  <div class="result-body">

    <!-- 統計卡 -->
    <div>
      <p class="section-title">總覽</p>
      <div class="stat-row">
        <div class="stat-card">
          <div class="si">⏱</div>
          <span class="sl">旅行時間</span>
          <span class="sv" id="r-travel-time">--</span>
        </div>
        <div class="stat-card">
          <div class="si">🚦</div>
          <span class="sl">總延滯</span>
          <span class="sv" id="r-total-delay">--</span>
        </div>
        <div class="stat-card">
          <div class="si">🏃</div>
          <span class="sl">行駛時間</span>
          <span class="sv" id="r-run-time">--</span>
        </div>
      </div>
    </div>

    <!-- 行駛路徑地圖 -->
    <div>
      <p class="section-title">行駛路徑與延滯位置</p>
      <div id="map-result"></div>
    </div>

    <!-- 延滯圖例 -->
    <div class="map-legend" id="map-legend"></div>

    <!-- 延滯明細 -->
    <div id="delay-section">
      <p class="section-title">延滯明細</p>
      <table class="delay-table">
        <thead>
          <tr>
            <th>原因</th>
            <th>開始</th>
            <th>秒數</th>
            <th>位置</th>
          </tr>
        </thead>
        <tbody id="delay-tbody"></tbody>
      </table>
    </div>

    <!-- 匯出 -->
    <div>
      <p class="section-title">匯出資料</p>
      <div class="export-btns">
        <button class="btn-export csv"    onclick="exportCSV()">⬇ CSV</button>
        <button class="btn-export report" onclick="exportReport()">📄 報告</button>
        <button class="btn-export copy"   onclick="copyJSON()">📋 JSON</button>
      </div>
    </div>

    <button class="btn-restart" onclick="restartApp()">🔄 新增旅次</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════
//  常數
// ════════════════════════════════════════════════
const DELAY_TYPES = [
  { cause: 'red_light',  label: '紅燈',    icon: '🔴', color: '#ef4444' },
  { cause: 'bus_stop',   label: '公車站',   icon: '🚌', color: '#f97316' },
  { cause: 'parking',    label: '路邊停車', icon: '🅿️', color: '#eab308' },
  { cause: 'congestion', label: '交通阻塞', icon: '🚦', color: '#8b5cf6' },
  { cause: 'pedestrian', label: '行人穿越', icon: '🚶', color: '#06b6d4' },
  { cause: 'other',      label: '其他',    icon: '❓', color: '#94a3b8' },
]

const PEAK_LABELS = { peak: '🔴 尖峰', off_peak: '🟢 離峰' }
const DIR_LABELS  = { bound: '→ 去程', return: '← 回程' }

// ════════════════════════════════════════════════
//  狀態
// ════════════════════════════════════════════════
let watchId       = null
let mapReady      = null
let mapSurvey     = null
let mapResult     = null
let markerReady   = null
let markerSurvey  = null
let lastPos       = null
let lastRaw       = null

let selectedPeakType  = null   // 'peak' | 'off_peak'
let selectedDirection = null   // 'bound' | 'return'

let surveyStartTime = null
let surveyEndTime   = null
let gpsTrack        = []   // [{ lat, lng, speed_ms, accuracy_m, ts }]
let delayRecords    = []   // [{ cause, label, icon, color, startedAt, endedAt, durationS, pos }]
let activeDelay     = null  // { cause, startedAt, timerId, startPos }

let clockTimer = null
let elapsedSec = 0

// ════════════════════════════════════════════════
//  工具
// ════════════════════════════════════════════════
function fmtSec(s) {
  const m = Math.floor(s / 60), r = s % 60
  return `${String(m).padStart(2,'0')}:${String(r).padStart(2,'0')}`
}
function fmtTime(s) {
  if (!s && s !== 0) return '--'
  const m = Math.floor(s / 60), r = s % 60
  return `${m}分${String(r).padStart(2,'0')}秒`
}
function fmtHMS(date) {
  return date ? date.toTimeString().slice(0,8) : ''
}
function showToast(msg) {
  const t = document.getElementById('toast')
  t.textContent = msg; t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 2200)
}
function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'))
  document.getElementById(id).classList.add('active')
  setTimeout(() => {
    if (id === 'screen-survey' && mapSurvey) mapSurvey.invalidateSize()
    if (id === 'screen-result' && mapResult) mapResult.invalidateSize()
  }, 80)
}

// ════════════════════════════════════════════════
//  組合選擇
// ════════════════════════════════════════════════
function selectPeak(type) {
  selectedPeakType = type
  document.getElementById('btn-peak').classList.toggle('peak-sel', type === 'peak')
  document.getElementById('btn-offpeak').classList.toggle('peak-sel', type === 'off_peak')
  updateComboBadge()
}
function selectDir(dir) {
  selectedDirection = dir
  document.getElementById('btn-bound').classList.toggle('bound-sel', dir === 'bound')
  document.getElementById('btn-return').classList.toggle('bound-sel', dir === 'return')
  updateComboBadge()
}
function updateComboBadge() {
  const badge = document.getElementById('combo-badge')
  if (selectedPeakType && selectedDirection) {
    badge.style.display = 'block'
    badge.textContent = `${PEAK_LABELS[selectedPeakType]}　${DIR_LABELS[selectedDirection]}`
  } else {
    badge.style.display = 'none'
  }
  checkStartReady()
}
function checkStartReady() {
  const btn = document.getElementById('btn-start')
  const gpsOk = document.getElementById('gps-dot-ready').classList.contains('good') ||
                document.getElementById('gps-dot-ready').classList.contains('poor')
  btn.disabled = !(selectedPeakType && selectedDirection && gpsOk)
}

// ════════════════════════════════════════════════
//  GPS
// ════════════════════════════════════════════════
function smooth(lat, lng, alpha = 0.25) {
  if (!lastPos) return { lat, lng }
  return {
    lat: lastPos.lat * (1 - alpha) + lat * alpha,
    lng: lastPos.lng * (1 - alpha) + lng * alpha,
  }
}

function startGPS() {
  if (!navigator.geolocation) { alert('此裝置不支援 GPS'); return }
  watchId = navigator.geolocation.watchPosition(
    onPosition, onGPSError,
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 2000 }
  )
}

function onPosition(pos) {
  lastRaw = pos
  const { latitude: rawLat, longitude: rawLng, accuracy, speed } = pos.coords
  const { lat, lng } = smooth(rawLat, rawLng)
  lastPos = { lat, lng }

  const dot  = document.getElementById('gps-dot-ready')
  const text = document.getElementById('gps-text-ready')
  if (accuracy < 30) {
    dot.className = 'gps-dot good'
    text.textContent = `GPS 良好 ±${Math.round(accuracy)}m`
  } else {
    dot.className = 'gps-dot poor'
    text.textContent = `GPS 精度 ±${Math.round(accuracy)}m`
  }
  checkStartReady()

  const badge = document.getElementById('gps-badge')
  if (badge) badge.textContent = `📡 ±${Math.round(accuracy)}m`

  updateMap(mapReady, markerReady, lat, lng, false)

  if (surveyStartTime) {
    updateMap(mapSurvey, markerSurvey, lat, lng, true)
    gpsTrack.push({ lat, lng, speed_ms: speed, accuracy_m: accuracy, ts: new Date().toISOString() })
  }
}

function onGPSError(err) {
  const text = document.getElementById('gps-text-ready')
  if (text) text.textContent = `GPS 錯誤：${err.message}`
}

function updateMap(map, marker, lat, lng, follow) {
  if (!map || !marker) return
  marker.setLatLng([lat, lng])
  if (follow) {
    map.setView([lat, lng], map.getZoom() || 16, { animate: true, duration: 0.5 })
  } else if (!map._loaded || map.getZoom() === undefined) {
    map.setView([lat, lng], 16)
  } else {
    map.panTo([lat, lng], { animate: true, duration: 0.3 })
  }
}

// ════════════════════════════════════════════════
//  初始化地圖 A
// ════════════════════════════════════════════════
function initReadyMap() {
  mapReady = L.map('map-ready', { zoomControl: true, attributionControl: false })
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, keepBuffer: 4 }).addTo(mapReady)
  mapReady.setView([25.04776, 121.51755], 14)
  markerReady = L.circleMarker([25.04776, 121.51755], {
    radius: 10, fillColor: '#3B82F6', color: '#fff', weight: 3, fillOpacity: .95,
  }).bindTooltip('你在這裡').addTo(mapReady)
}

// ════════════════════════════════════════════════
//  開始調查
// ════════════════════════════════════════════════
function startSurvey() {
  surveyStartTime = new Date()
  gpsTrack = []; delayRecords = []; elapsedSec = 0

  // 狀態列顯示組合
  document.getElementById('status-label').textContent =
    `● ${PEAK_LABELS[selectedPeakType]} ${DIR_LABELS[selectedDirection]}`

  switchScreen('screen-survey')

  if (!mapSurvey) {
    mapSurvey = L.map('map-survey', { zoomControl: false, attributionControl: false })
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, keepBuffer: 4 }).addTo(mapSurvey)
    const initPos = lastPos ? [lastPos.lat, lastPos.lng] : [25.04776, 121.51755]
    mapSurvey.setView(initPos, 16)
    markerSurvey = L.circleMarker(initPos, {
      radius: 11, fillColor: '#3B82F6', color: '#fff', weight: 3, fillOpacity: .95,
    }).addTo(mapSurvey)
  }

  clockTimer = setInterval(() => {
    elapsedSec++
    document.getElementById('status-timer').textContent = fmtSec(elapsedSec)
  }, 1000)

  buildDelayButtons()
}

// ════════════════════════════════════════════════
//  延滯按鈕
// ════════════════════════════════════════════════
function buildDelayButtons() {
  const grid = document.getElementById('delay-grid')
  grid.innerHTML = ''
  DELAY_TYPES.forEach(d => {
    const btn = document.createElement('button')
    btn.className = 'btn-delay'
    btn.id = `dbtn-${d.cause}`
    btn.innerHTML = `<span class="di">${d.icon}</span><span class="dn">${d.label}</span><span class="dt" id="dtimer-${d.cause}"></span>`
    btn.onclick = () => toggleDelay(d)
    grid.appendChild(btn)
  })
}

function toggleDelay(d) {
  if (activeDelay && activeDelay.cause === d.cause) {
    clearInterval(activeDelay.timerId)
    const endedAt   = new Date()
    const durationS = Math.round((endedAt - activeDelay.startedAt) / 1000)
    delayRecords.push({
      cause: d.cause, label: d.label, icon: d.icon, color: d.color,
      startedAt: activeDelay.startedAt, endedAt, durationS,
      pos: activeDelay.startPos,
    })
    document.getElementById(`dbtn-${d.cause}`).classList.remove('active')
    document.getElementById(`dtimer-${d.cause}`).textContent = ''
    activeDelay = null
  } else {
    if (activeDelay) {
      const prev = DELAY_TYPES.find(x => x.cause === activeDelay.cause)
      if (prev) toggleDelay(prev)
    }
    const startedAt  = new Date()
    const startPos   = lastPos ? { ...lastPos } : null
    let elapsed = 0
    const timerId = setInterval(() => {
      elapsed++
      const el = document.getElementById(`dtimer-${d.cause}`)
      if (el) el.textContent = fmtSec(elapsed)
    }, 1000)
    activeDelay = { cause: d.cause, startedAt, timerId, startPos }
    document.getElementById(`dbtn-${d.cause}`).classList.add('active')
  }
}

// ════════════════════════════════════════════════
//  結束調查
// ════════════════════════════════════════════════
function endSurvey() {
  if (!confirm('確定結束調查？')) return
  surveyEndTime = new Date()
  if (activeDelay) {
    const prev = DELAY_TYPES.find(x => x.cause === activeDelay.cause)
    if (prev) toggleDelay(prev)
  }
  clearInterval(clockTimer)
  buildResult()
  switchScreen('screen-result')
}

// ════════════════════════════════════════════════
//  建立結果頁
// ════════════════════════════════════════════════
function buildResult() {
  const travelS     = Math.round((surveyEndTime - surveyStartTime) / 1000)
  const totalDelayS = delayRecords.reduce((s, r) => s + r.durationS, 0)
  const runS        = Math.max(0, travelS - totalDelayS)

  // 標頭
  document.getElementById('result-datetime').textContent =
    `${surveyStartTime.toLocaleDateString('zh-TW')}  ${fmtHMS(surveyStartTime)} → ${fmtHMS(surveyEndTime)}`
  document.getElementById('result-combo-tag').textContent =
    `${PEAK_LABELS[selectedPeakType]}  ${DIR_LABELS[selectedDirection]}`

  // 統計
  document.getElementById('r-travel-time').textContent = fmtTime(travelS)
  document.getElementById('r-total-delay').textContent = fmtTime(totalDelayS)
  document.getElementById('r-run-time').textContent    = fmtTime(runS)

  // ── 結果地圖 ──
  if (mapResult) { mapResult.remove(); mapResult = null }
  mapResult = L.map('map-result', { zoomControl: true, attributionControl: false })
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(mapResult)

  const latlngs = gpsTrack.map(p => [p.lat, p.lng])
  if (latlngs.length >= 2) {
    // 行駛路徑（藍色線）
    const polyline = L.polyline(latlngs, { color: '#3b82f6', weight: 4, opacity: .85 }).addTo(mapResult)
    mapResult.fitBounds(polyline.getBounds(), { padding: [24, 24] })

    // 起點（綠）
    L.circleMarker(latlngs[0], { radius: 9, fillColor: '#16a34a', color: '#fff', weight: 2.5, fillOpacity: 1 })
      .bindPopup('起點').addTo(mapResult)

    // 終點（紅）
    L.circleMarker(latlngs[latlngs.length - 1], { radius: 9, fillColor: '#dc2626', color: '#fff', weight: 2.5, fillOpacity: 1 })
      .bindPopup('終點').addTo(mapResult)
  } else if (latlngs.length === 1) {
    mapResult.setView(latlngs[0], 16)
  } else if (lastPos) {
    mapResult.setView([lastPos.lat, lastPos.lng], 14)
  }

  // 延滯標記
  const seenCauses = new Set()
  delayRecords.forEach((r, i) => {
    if (!r.pos) return
    seenCauses.add(r.cause)
    const icon = L.divIcon({
      html: `<div style="font-size:20px;line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,.5))">${r.icon}</div>`,
      className: '', iconSize: [24, 24], iconAnchor: [12, 12],
    })
    L.marker([r.pos.lat, r.pos.lng], { icon })
      .bindPopup(`<b>${r.icon} ${r.label}</b><br>${fmtHMS(r.startedAt)}<br>持續 ${r.durationS} 秒`)
      .addTo(mapResult)
  })

  // 圖例
  const legend = document.getElementById('map-legend')
  legend.innerHTML = ''
  if (latlngs.length > 0) {
    legend.innerHTML += `<div class="legend-item"><span style="display:inline-block;width:24px;height:4px;background:#3b82f6;border-radius:2px"></span> 行駛路徑</div>`
    legend.innerHTML += `<div class="legend-item">🟢 起點</div>`
    legend.innerHTML += `<div class="legend-item">🔴 終點</div>`
  }
  DELAY_TYPES.filter(d => seenCauses.has(d.cause)).forEach(d => {
    legend.innerHTML += `<div class="legend-item">${d.icon} ${d.label}</div>`
  })
  legend.style.display = seenCauses.size > 0 || latlngs.length > 0 ? 'flex' : 'none'

  // 延滯明細表
  const tbody = document.getElementById('delay-tbody')
  tbody.innerHTML = ''
  if (delayRecords.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" style="color:#94a3b8;text-align:center;padding:12px">無延滯記錄</td></tr>'
  } else {
    delayRecords.forEach(r => {
      const posStr = r.pos ? `${r.pos.lat.toFixed(5)}, ${r.pos.lng.toFixed(5)}` : '—'
      const tr = document.createElement('tr')
      tr.innerHTML = `<td>${r.icon} ${r.label}</td><td>${fmtHMS(r.startedAt)}</td><td>${r.durationS}s</td><td style="font-size:11px;color:#94a3b8">${posStr}</td>`
      tbody.appendChild(tr)
    })
    const total = document.createElement('tr')
    total.style.fontWeight = '700'
    total.innerHTML = `<td>合計</td><td></td><td>${totalDelayS}s</td><td></td>`
    tbody.appendChild(total)
  }
}

// ════════════════════════════════════════════════
//  匯出 CSV
// ════════════════════════════════════════════════
function exportCSV() {
  const travelS     = Math.round((surveyEndTime - surveyStartTime) / 1000)
  const totalDelayS = delayRecords.reduce((s, r) => s + r.durationS, 0)
  const runS        = Math.max(0, travelS - totalDelayS)

  let csv = '旅行時間調查報告\n'
  csv += `調查日期,${surveyStartTime.toLocaleDateString('zh-TW')}\n`
  csv += `時段,${selectedPeakType === 'peak' ? '尖峰' : '離峰'}\n`
  csv += `方向,${selectedDirection === 'bound' ? '去程' : '回程'}\n`
  csv += `開始時間,${fmtHMS(surveyStartTime)}\n`
  csv += `結束時間,${fmtHMS(surveyEndTime)}\n`
  csv += `旅行時間（秒）,${travelS}\n`
  csv += `總延滯（秒）,${totalDelayS}\n`
  csv += `行駛時間（秒）,${runS}\n`
  csv += `GPS軌跡點數,${gpsTrack.length}\n`
  csv += '\n延滯明細\n原因,開始時間,結束時間,持續秒數,緯度,經度\n'
  delayRecords.forEach(r => {
    csv += `${r.label},${fmtHMS(r.startedAt)},${fmtHMS(r.endedAt)},${r.durationS},${r.pos ? r.pos.lat : ''},${r.pos ? r.pos.lng : ''}\n`
  })
  csv += '\nGPS軌跡\n緯度,經度,速度(m/s),精度(m),時間\n'
  gpsTrack.forEach(p => {
    csv += `${p.lat},${p.lng},${p.speed_ms ?? ''},${p.accuracy_m ?? ''},${p.ts}\n`
  })

  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' })
  const a = document.createElement('a')
  a.href = URL.createObjectURL(blob)
  a.download = `survey_${surveyStartTime.toISOString().slice(0,10)}_${selectedPeakType}_${selectedDirection}.csv`
  a.click()
  showToast('✅ CSV 已下載')
}

</head>

// ════════════════════════════════════════════════
//  複製 JSON
// ════════════════════════════════════════════════
function copyJSON() {
  const data = {
    peakType:   selectedPeakType,
    direction:  selectedDirection,
    startedAt:  surveyStartTime.toISOString(),
    endedAt:    surveyEndTime.toISOString(),
    travelTimeS: Math.round((surveyEndTime - surveyStartTime) / 1000),
    totalDelayS: delayRecords.reduce((s, r) => s + r.durationS, 0),
    delayRecords: delayRecords.map(r => ({
      cause: r.cause, label: r.label,
      startedAt: r.startedAt.toISOString(),
      endedAt: r.endedAt.toISOString(),
      durationS: r.durationS,
      pos: r.pos,
    })),
    gpsTrack,
  }
  navigator.clipboard.writeText(JSON.stringify(data, null, 2))
    .then(() => showToast('✅ JSON 已複製'))
    .catch(() => showToast('❌ 複製失敗'))
}

// ════════════════════════════════════════════════
//  重新開始
// ════════════════════════════════════════════════
function restartApp() {
  surveyStartTime = surveyEndTime = null
  gpsTrack = []; delayRecords = []; activeDelay = null; elapsedSec = 0
  document.getElementById('status-timer').textContent = '00:00'
  if (mapSurvey && lastPos) {
    markerSurvey.setLatLng([lastPos.lat, lastPos.lng])
    mapSurvey.setView([lastPos.lat, lastPos.lng], 16)
  }
  switchScreen('screen-ready')
}

// ════════════════════════════════════════════════
//  啟動
// ════════════════════════════════════════════════
window.addEventListener('load', () => {
  initReadyMap()
  startGPS()
  // 3 秒後若 GPS 仍未回應，允許選完組合就開始
  setTimeout(() => {
    const dot = document.getElementById('gps-dot-ready')
    if (!dot.classList.contains('good') && !dot.classList.contains('poor')) {
      dot.className = 'gps-dot poor'
      document.getElementById('gps-text-ready').textContent = 'GPS 訊號弱，可嘗試開始'
    }
    checkStartReady()
  }, 5000)
})
</script>
