<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>旅行時間調查 — 監測報告</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'PingFang TC',sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}

/* ── Loading / Error ── */
#loading-screen{position:fixed;inset:0;background:#0f172a;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;z-index:999}
#loading-screen p{color:white;font-size:15px;font-weight:700;letter-spacing:.3px}
#loading-screen small{color:#64748b;font-size:12px;margin-top:-12px}

/* Loading road scene */
.ld-road-scene{width:440px;position:relative;padding-top:36px} /* padding makes room for car above road */
.ld-road{width:100%;height:52px;background:#334155;border-radius:12px;display:flex;align-items:center;overflow:hidden}
.ld-dashes{display:flex;gap:10px;padding:0 12px;width:100%;flex-shrink:0}
.ld-dash{flex:1;height:7px;background:#f59e0b;border-radius:3px;opacity:.9}
/* Car sits above road — position driven by JS progress */
.ld-car{position:absolute;font-size:52px;top:0;left:-60px;
  transform:scaleX(-1);
  transition:left 0.5s ease-out;
  filter:drop-shadow(0 6px 10px rgba(0,0,0,.5));
  z-index:10;line-height:1}

/* ── Download overlay ── */
#dl-overlay{position:fixed;inset:0;background:#0f172a;display:none;align-items:center;justify-content:center;flex-direction:column;gap:20px;z-index:2000}
#dl-overlay .dl-label{color:white;font-size:15px;font-weight:700;letter-spacing:.3px}
#dl-overlay .dl-sub{color:#64748b;font-size:12px;margin-top:-12px}

/* Road scene */
.dl-road-scene{width:440px;position:relative;padding-top:36px}
.dl-road{width:100%;height:52px;background:#334155;border-radius:12px;display:flex;align-items:center;overflow:hidden}
.dl-dashes{display:flex;gap:10px;padding:0 12px;width:100%;flex-shrink:0}
.dl-dash{flex:1;height:7px;background:#f59e0b;border-radius:3px;opacity:.9}
.dl-car{position:absolute;font-size:52px;top:0;left:-60px;
  transform:scaleX(-1);
  animation:car-drive var(--dl-dur,2.5s) linear forwards;
  filter:drop-shadow(0 6px 10px rgba(0,0,0,.5));
  z-index:10;line-height:1}
@keyframes car-drive{
  0%  {left:-60px}
  100%{left:calc(100% + 8px)}
}

/* Progress bar */
.dl-progress-track{width:440px;height:5px;background:#1e293b;border-radius:10px;overflow:hidden}
.dl-progress-bar{height:100%;background:#3b82f6;border-radius:10px;width:0%;animation:dl-fill var(--dl-dur,2.5s) linear forwards}
@keyframes dl-fill{0%{width:0%}100%{width:100%}}

/* ── Page header ── */
.page-header{background:#1e293b;color:white;padding:16px 20px 0;position:sticky;top:0;z-index:100}
.rpt-title{font-size:11px;font-weight:700;color:#60a5fa;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.page-header h1{font-size:20px;font-weight:800;margin-bottom:3px}
.page-header .sub{font-size:11px;color:#94a3b8;margin-bottom:14px;line-height:1.6}
.tab-bar{display:flex;gap:2px}
.tab-btn{padding:11px 20px;font-size:13px;font-weight:700;border:none;background:transparent;color:#64748b;cursor:pointer;border-radius:8px 8px 0 0;transition:.15s;border-bottom:3px solid transparent}
.tab-btn.active{background:#f1f5f9;color:#1e293b;border-bottom-color:#3b82f6}

/* ── Panels ── */
.panel{display:none;padding:20px;animation:fadeIn .2s;max-width:1200px;margin:0 auto}
.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ── Cards ── */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:18px}
.card{background:white;border-radius:14px;padding:16px;text-align:center;box-shadow:0 1px 4px #0001}
.card .val{font-size:24px;font-weight:800;color:#1e40af}
.card .lbl{font-size:11px;color:#64748b;margin-top:4px}

/* ── Tables ── */
.section{background:white;border-radius:14px;padding:18px;margin-bottom:16px;box-shadow:0 1px 4px #0001}
.section h3{font-size:13px;font-weight:700;color:#334155;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:6px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#1e293b;color:white;font-weight:600;padding:8px 10px;text-align:center;white-space:nowrap}
td{padding:7px 10px;border:1px solid #e2e8f0;text-align:center}
tr:nth-child(even) td{background:#fafafa}
td:first-child{text-align:left;font-weight:500}
.total-row td{background:#eff6ff!important;font-weight:700;color:#1e40af}
.highlight{color:#1e40af;font-weight:700}

/* ── 調查紀錄 combo selector ── */
.combo-selector{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.combo-sel-btn{flex:1;min-width:120px;padding:12px 10px;border:2px solid #e2e8f0;border-radius:12px;background:white;cursor:pointer;font-size:13px;font-weight:700;color:#64748b;text-align:center;transition:.15s;line-height:1.4}
.combo-sel-btn:hover{border-color:#93c5fd;color:#1d4ed8}
.combo-sel-btn.active.peak{background:#dc2626;border-color:#dc2626;color:white}
.combo-sel-btn.active.offpeak{background:#2563eb;border-color:#2563eb;color:white}
.combo-sel-btn .cs-label{font-size:15px;font-weight:800;display:block}
.combo-sel-btn .cs-sub{font-size:10px;opacity:.8;display:block;margin-top:2px}
.no-data-msg{text-align:center;padding:40px;color:#94a3b8;background:white;border-radius:14px}

/* ── Survey record card ── */
.sv-record{background:white;border-radius:14px;margin-bottom:14px;box-shadow:0 1px 4px #0001;overflow:hidden}
.sv-rec-header{background:#1e293b;color:white;padding:12px 18px;display:flex;justify-content:space-between;align-items:center;font-size:13px}
.sv-rec-header .sv-num{font-size:11px;color:#60a5fa;font-weight:700;margin-bottom:2px}
.sv-rec-header .sv-info{font-size:14px;font-weight:700}
.sv-rec-header .sv-meta{font-size:11px;color:#94a3b8;text-align:right;line-height:1.6}
.sv-rec-body{padding:0}

/* ── SGS Paper Form — 版本2 深藍典雅 ── */
.sgs-pf{background:#fff;border:1.5px solid #1e3a5f;border-radius:10px;overflow:hidden;margin:0}
.sgs-pf-hdr{display:flex;align-items:stretch;background:#1e3a5f;border-bottom:1.5px solid #2c4a6e}
.sgs-pf-title-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:8px 12px}
.sgs-pf-title-wrap h2{font-size:15px;font-weight:700;color:#fff;letter-spacing:2px;white-space:nowrap}
.sgs-pf-date-box{display:flex;align-items:center;padding:8px 14px;font-size:11px;color:#a8c4e0;white-space:nowrap}
.sgs-pf-date-box .dv{color:#f87171;font-weight:700;margin-left:4px}
.sgs-pf-meta{display:flex;background:#eef3fa;border-bottom:1.5px solid #1e3a5f}
.sgs-pf-ml{flex:1;padding:7px 14px;border-right:1px solid #94a3b8;font-size:11px;line-height:1.9;color:#1e3a5f}
.sgs-pf-ml u{text-decoration-color:#3d6490}
.sgs-pf-mr{width:200px;padding:7px 14px;font-size:11px;line-height:2.2;color:#1e3a5f;text-align:left}
.sgs-pf-mr u{text-decoration-color:#3d6490}
.sgs-pf-divider{border:none;border-top:1.5px solid #1e3a5f;margin:0}
/* shared table styles */
.sgs-pf-tbl{width:100%;border-collapse:collapse;font-size:11px}
.sgs-pf-tbl td,.sgs-pf-tbl th{border:1px solid #b0bec5;padding:4px 6px;vertical-align:middle;text-align:center;white-space:nowrap;background:#fff;color:#1a1a2e}
/* 三層表頭 */
.pfth1{background:#4a6fa5!important;color:#fff!important;font-weight:700;font-size:11px}
.pfth2{background:#4a6fa5!important;color:#fff!important;font-weight:600;font-size:10.5px}
.pfth3{background:#4a6fa5!important;color:#fff!important;font-weight:500;font-size:10px}
.pfth-road{background:#4a6fa5!important;color:#fff!important;font-weight:600;font-size:11px;letter-spacing:.5px}
.pfth-int{background:#4a6fa5!important;color:#fff!important;font-weight:600;font-size:11px;letter-spacing:.5px}
/* 資料格 */
.pf-seg{text-align:left!important;font-weight:600;color:#1e3a5f;background:#f0f4fa!important}
.pf-time{color:#1565c0;font-weight:800;font-size:12px}
.pf-arrive{background:#c8f7d0!important;color:#1b5e20;font-weight:800}
.pf-spd{font-size:15px;font-weight:800;color:#1e3a5f}
.pf-pct{font-size:9.5px;background:#f0f4fa!important;color:#374151}
.pf-totrow td{background:#dbeafe!important;font-weight:700;color:#1e3a5f;border-color:#93c5fd}
.pf-fl{background:#dde3ed!important;font-weight:700;text-align:left!important;color:#1e3a5f;font-size:10.5px}
.pf-fv{background:#f5f7fa!important;color:#1a1a2e;font-size:11px;font-weight:600}

/* ── Download ── */
.dl-section{background:white;border-radius:14px;padding:28px;text-align:center;max-width:600px;margin:0 auto}
.dl-section h3{font-size:18px;font-weight:800;margin-bottom:8px}
.dl-btn{display:inline-flex;align-items:center;gap:8px;color:white;border:none;padding:15px 32px;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;margin:10px;transition:.15s;box-shadow:0 4px 14px #0002}
.dl-btn.green{background:#16a34a}
.dl-btn.green:hover{background:#15803d}
.dl-btn.blue{background:#2563eb}
.dl-btn.blue:hover{background:#1d4ed8}
.dl-note{font-size:12px;color:#64748b;margin-top:8px;line-height:1.7;text-align:left;background:#f8fafc;padding:14px;border-radius:10px}

/* ── Trip map ── */
.trip-map-section{border-top:1px solid #e2e8f0}
.trip-map-header{padding:10px 14px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;background:#fff;flex-wrap:wrap;gap:6px}
.trip-map-header .tmap-title{font-size:12px;color:#475569;display:flex;align-items:center;gap:5px}
.trip-map-legrow{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.tmap-leg{display:flex;align-items:center;gap:5px;font-size:11px;color:#64748b}
.tmap-leg .ll-solid{width:20px;height:3px;border-radius:2px;display:inline-block}
.tmap-leg .ll-dashed{width:20px;height:0;border-top:2px dashed #94a3b8;display:inline-block}
.tmap-leg .ll-node{width:16px;height:16px;border-radius:50%;background:#22c55e;border:2px solid #fff;display:inline-flex;align-items:center;justify-content:center;font-size:7px;color:#fff;font-weight:700}
.trip-map-wrap{position:relative;height:380px;background:#e2e8f0}
.trip-map{width:100%;height:100%}
.trip-map-note{padding:7px 14px;font-size:11px;color:#94a3b8;border-top:1px solid #f1f5f9;display:flex;gap:14px;flex-wrap:wrap;background:#fafafa}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="ld-road-scene">
    <div class="ld-road">
      <div class="ld-dashes">
        <div class="ld-dash"></div><div class="ld-dash"></div><div class="ld-dash"></div>
        <div class="ld-dash"></div><div class="ld-dash"></div><div class="ld-dash"></div>
        <div class="ld-dash"></div><div class="ld-dash"></div><div class="ld-dash"></div>
        <div class="ld-dash"></div><div class="ld-dash"></div><div class="ld-dash"></div>
      </div>
      <div class="ld-car" id="ld-car">🚗</div>
    </div>
  </div>
  <p id="ld-msg">載入調查結果...</p>
  <small id="ld-sub"></small>
</div>

<!-- Download overlay -->
<div id="dl-overlay">
  <p class="dl-label" id="dl-overlay-label">產生報告中...</p>
  <div class="dl-road-scene">
    <div class="dl-road">
      <div class="dl-dashes">
        <div class="dl-dash"></div><div class="dl-dash"></div><div class="dl-dash"></div>
        <div class="dl-dash"></div><div class="dl-dash"></div><div class="dl-dash"></div>
        <div class="dl-dash"></div><div class="dl-dash"></div><div class="dl-dash"></div>
        <div class="dl-dash"></div><div class="dl-dash"></div><div class="dl-dash"></div>
      </div>
      <div class="dl-car" id="dl-car">🚗</div>
    </div>
  </div>
  <div class="dl-progress-track">
    <div class="dl-progress-bar" id="dl-progress-bar"></div>
  </div>
  <small class="dl-sub" id="dl-overlay-sub">請稍候</small>
</div>

<div id="app" style="display:none">
  <div class="page-header">
    <div class="rpt-title">📊 調查報告</div>
    <h1 id="hdr-title">—</h1>
    <div class="sub" id="hdr-sub">—</div>
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="stats" onclick="switchTab('stats')">📊 統計表</button>
      <button class="tab-btn" data-tab="trips" onclick="switchTab('trips')">📋 調查紀錄</button>
      <button class="tab-btn" data-tab="dl" onclick="switchTab('dl')">📥 下載報告</button>
    </div>
  </div>

  <!-- STATS -->
  <div id="panel-stats" class="panel active">
    <div class="cards" id="stat-cards"></div>
    <div class="section">
      <h3>📋 各路段平均旅行時間及行駛時間統計表（秒）</h3>
      <div style="overflow-x:auto"><table id="tbl-travel"></table></div>
    </div>
    <div class="section">
      <h3>🚗 各路段平均旅行速率及行駛速率統計表（公里/時）</h3>
      <div style="overflow-x:auto"><table id="tbl-speed"></table></div>
    </div>
    <div class="section">
      <h3>⏱ 延滯統計摘要</h3>
      <div style="overflow-x:auto"><table id="tbl-delay"></table></div>
    </div>
  </div>

  <!-- TRIPS -->
  <div id="panel-trips" class="panel">
    <!-- Combo selector -->
    <div class="combo-selector" id="combo-selector"></div>
    <!-- Survey records for selected combo -->
    <div id="combo-records"></div>
  </div>

  <!-- DOWNLOAD -->
  <div id="panel-dl" class="panel">
    <div class="dl-section">
      <h3>下載 SGS 公版報告</h3>
      <p style="font-size:13px;color:#64748b;margin:8px 0 20px">依據「主次要幹道行駛時間及延滯調查表」格式產出報告</p>
      <button class="dl-btn green" onclick="downloadSGS()">📥 下載 SGS Excel (.xlsx)</button>
      <button class="dl-btn" style="background:#1e3a5f" onclick="downloadSGSPdf()">🖨 列印 SGS PDF 表格</button>
      <button class="dl-btn blue" onclick="downloadCSV()">📄 下載原始數據 (.csv)</button>
      <div class="dl-note" style="margin-top:20px">
        <b>SGS Excel 包含：</b><br>
        ・行駛速率統計表（各路段旅行時間 / 行駛時間 / 速率）<br>
        ・延滯統計表（交叉口延滯 / 路段延滯 / 比例）<br>
        ・每趟旅次詳細記錄（主次要幹道行駛時間及延滯調查表格式）
      </div>
    </div>
  </div>
</div>

<script>



// ════════════════ SGS PDF PRINT ════════════════
function downloadSGSPdf(){
  if(!route||!surveys.length){ alert('尚無資料'); return }

  const ROAD_C = ['congestion','bus_stop','taxi_stop','parking','ped_cross','road_other']
  const INT_C  = ['red_light','left_same','left_opp','right_turn','cross_veh','ped_int','int_other']

  function _hms(ts){
    if(!ts) return ['—','—','—']
    const d = new Date(ts)
    if(isNaN(d.getTime())) return ['—','—','—']
    const s = d.toLocaleTimeString('zh-TW',{timeZone:'Asia/Taipei',hour12:false,
      hour:'2-digit',minute:'2-digit',second:'2-digit'})
    return s.split(':').map(Number)
  }
  function _spd(lenM, tS){
    if(!lenM||!tS||tS<=0) return ''
    return ((lenM/1000)/(tS/3600)).toFixed(1)
  }
  function _pct(v, t){ return t>0 ? Math.round((v||0)/t*100)+'%' : '0%' }
  const _dl = v => (v && v>0) ? v : ''

  const off = route.offPeakLabel||'離峰', pk = route.peakLabel||'尖峰'
  const segs = route.segments||[], allNodes = route.nodes||[]
  const totalLen = route.totalLength||''

  let pages = []
  surveys.forEach((sv, si)=>{
    ;(sv.trips||[]).forEach(trip=>{
      const isReturn = trip.direction==='return'
      const isPeak   = trip.peakType==='peak'
      const segOrd   = isReturn ? [...segs].reverse() : segs
      const nodeOrd  = isReturn ? [...allNodes].reverse() : allNodes
      const times    = trip.segTimes||[]
      const nodeTs   = trip.nodeTimestamps||[]

      const [sH,sM,sS] = _hms(trip.startTime)
      const [eH,eM,eS] = _hms(trip.endTime)
      const startN = nodeOrd[0]?.name||'起點'
      const endN   = nodeOrd[nodeOrd.length-1]?.name||'終點'
      const tSpd   = _spd(route.totalLength, trip.travelS)
      const rSpd   = _spd(route.totalLength, trip.runS)
      const rd = trip.roadDelays||{}, id = trip.intDelays||{}
      const roadT = trip.roadTotalS||0, intT = trip.intTotalS||0

      // Per-segment rows
      // nodeTimestamps[i+1] = arrival at end of segment i (bound direction)
      // For return: reversed segment i ends at original node (segs.length-1-i)
      const segRows = segOrd.map((seg,i)=>{
        const tsIdx = isReturn ? (segs.length - 1 - i) : (i + 1)
        const [nH,nM,nS] = _hms(nodeTs[tsIdx])
        const t = times[i]||{}
        return `<tr>
          <td colspan="2" class="sgs-seg">${seg.name||''}</td>
          <td class="sgs-t-time">${nH}</td><td class="sgs-t-time">${nM}</td><td class="sgs-t-time">${nS}</td>
          <td></td><td></td><td></td><td></td><td></td><td></td>
          <td></td><td></td><td></td><td></td><td></td><td></td><td></td>
          <td>${t.travelS||''}</td><td>${seg.length||''}</td><td>${t.runS||''}</td>
          <td>${_spd(seg.length,t.travelS)}</td><td>${_spd(seg.length,t.runS)}</td>
        </tr>`
      }).join('')

      const emptyRows = Array(Math.max(0, 7 - segOrd.length))
        .fill(`<tr>${'<td></td>'.repeat(23)}</tr>`).join('')

      pages.push(`<div class="pg"><table class="f">
<tr>
  <td colspan="20" class="f-title">主次要幹道行駛時間及延滯調查表</td>
  <td colspan="2" class="f-ml">日　期：</td>
  <td class="f-mv" style="color:#dc2626;font-weight:700">${sv.date||''}</td>
</tr>
<tr>
  <td colspan="4" class="f-ml">站　名：</td>
  <td colspan="10" class="f-mv" style="text-decoration:underline">${route.routeName||''}</td>
  <td colspan="5"></td>
  <td colspan="2" class="f-ml" rowspan="2">天　氣：</td>
  <td class="f-mv" rowspan="2">${sv.weather||''}</td>
</tr>
<tr>
  <td colspan="4" class="f-ml">旅次編號：</td>
  <td colspan="16" class="f-mv">${si+1}</td>
</tr>
<tr>
  <td colspan="4" class="f-ml">方向往：</td>
  <td colspan="8" class="f-mv">${isReturn?'□':'■'} 去　　　${isReturn?'■':'□'} 回</td>
  <td colspan="7"></td>
  <td colspan="2" class="f-ml">調查員：</td>
  <td class="f-mv" style="text-decoration:underline">${sv.surveyor||''}</td>
</tr>
<tr>
  <td colspan="4" class="f-ml">時　間：</td>
  <td colspan="19" class="f-mv">${isPeak?'□':'■'} 離峰（${off}）　　${isPeak?'■':'□'} 尖峰（${pk}）</td>
</tr>
<tr class="f-th">
  <td colspan="2" rowspan="3">路<br><small>起點位置</small></td>
  <td colspan="2" rowspan="3">線<br><small>終點位置</small></td>
  <td rowspan="3">距離<br>(公尺)</td>
  <td colspan="6">時　　　　　　刻</td>
  <td colspan="4">總旅行時間(秒)及百分比</td>
  <td colspan="4" rowspan="3">總旅行速率<br>(公里/時)</td>
  <td colspan="4" rowspan="3">總行駛速率<br>(公里/時)</td>
</tr>
<tr class="f-th">
  <td colspan="3">起　點</td>
  <td colspan="3">終　點</td>
  <td rowspan="2">合計</td>
  <td rowspan="2">交叉口<br>延　滯</td>
  <td rowspan="2">路段中<br>延　滯</td>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"PingFang TC",Arial,sans-serif;background:white;color:#1e293b}
.pg{padding:2px}

<title>SGS 調查表 ${route.routeName||''}</title>

  w.document.close()
  setTimeout(()=>w.print(), 600)
